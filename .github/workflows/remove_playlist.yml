name: Remove Playlist

on:
  workflow_dispatch:
    inputs:
      playlist:
        description: "Spotify playlist URL or ID to remove"
        required: true
        type: string

jobs:
  remove:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Determine deploy target (main → root, other branches → /preview/)
      # ------------------------------------------------------------------
      - name: Determine deploy target
        id: target
        run: |
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "dest="               >> "$GITHUB_OUTPUT"
            echo "pages_url=${BASE}/"  >> "$GITHUB_OUTPUT"
            echo "preview=false"       >> "$GITHUB_OUTPUT"
          else
            echo "dest=preview"                >> "$GITHUB_OUTPUT"
            echo "pages_url=${BASE}/preview/"  >> "$GITHUB_OUTPUT"
            echo "preview=true"                >> "$GITHUB_OUTPUT"
          fi

      # ------------------------------------------------------------------
      # Restore data.js from gh-pages so we operate on the live data
      # ------------------------------------------------------------------
      - name: Restore data.js from gh-pages
        run: |
          git fetch origin gh-pages 2>/dev/null || true

          if [ "${{ steps.target.outputs.preview }}" = "true" ]; then
            if git show origin/gh-pages:preview/data.js > webapp/data.js 2>/dev/null; then
              echo "Restored data.js from preview"
            elif git show origin/gh-pages:data.js > webapp/data.js 2>/dev/null; then
              echo "Restored data.js from main (fallback)"
            else
              echo "No data.js found"
            fi
          else
            if git show origin/gh-pages:data.js > webapp/data.js 2>/dev/null; then
              echo "Restored data.js from main"
            else
              echo "No data.js found"
            fi
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ------------------------------------------------------------------
      # Remove the playlist and prune orphaned tracks
      # ------------------------------------------------------------------
      - name: Remove playlist
        env:
          PLAYLIST: ${{ inputs.playlist }}
        run: python remove_playlist.py --playlist "$PLAYLIST"

      # ------------------------------------------------------------------
      # Stamp build-info.js
      # ------------------------------------------------------------------
      - name: Write build-info.js
        run: |
          DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > webapp/js/build-info.js << EOF
          // Generated by remove_playlist workflow — do not edit manually.
          window.BUILD_INFO = { deployBranch: "${{ github.ref_name }}", deployedAt: "${DEPLOYED_AT}" };
          EOF

      # ------------------------------------------------------------------
      # Deploy updated webapp/ to gh-pages
      # ------------------------------------------------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webapp
          destination_dir: ${{ steps.target.outputs.dest }}
          keep_files: true
          commit_message: "chore: remove playlist from ${{ github.ref_name }} [skip ci]"
