<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnD Soundtrack</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Preview banner — populated and shown by app.js when not on main -->
  <div id="preview-banner" hidden></div>

  <!-- "No data" overlay — removed by ui.js if data.js has content -->
  <div id="no-data-overlay" class="overlay">
    <p>
      No playlist data found.<br><br>
      Trigger the <strong>Sync Playlist</strong> GitHub Actions workflow
      to analyze your playlist and generate <code>data.js</code>.<br><br>
      See the README for setup instructions.
    </p>
  </div>

  <!-- Tooltip (positioned by ui.js) -->
  <div id="mood-tooltip"></div>

  <main class="app">

    <h1>DnD Soundtrack</h1>

    <!-- ---- Mood Pad ---- -->
    <section class="mood-pad-wrapper" aria-label="Mood selector">
      <div class="mood-pad-label">drag to set the mood</div>
      <canvas id="mood-canvas" aria-label="Mood canvas — drag to select energy and valence"></canvas>
    </section>

    <!-- ---- Player Controls ---- -->
    <section class="player-controls" aria-label="Player controls">
      <div class="track-info">
        <span id="track-title">—</span>
        <span id="track-artist">—</span>
      </div>

      <div class="progress-container" role="progressbar" aria-valuemin="0" aria-valuemax="100">
        <div id="progress-bar"></div>
      </div>

      <span id="time-label">0:00 / 0:00</span>

      <div class="controls-row">
        <button id="btn-play-pause" aria-label="Play / Pause">▶</button>
        <button id="btn-next"       aria-label="Next track">⏭</button>
      </div>
    </section>

    <!-- ---- Playlist info ---- -->
    <footer class="playlist-info" id="playlist-info">
      <select id="playlist-select" aria-label="Select playlist"></select>
      <span id="playlist-track-count"></span>
    </footer>

  </main>

  <!--
    Script loading order — all deferred so they execute after DOM is parsed.

    1. data.js      — sets window.TRACK_DATA (must come first)
    2. config.js    — sets window.CONFIG (client_id, redirectUri, etc.)
    3. auth.js      — reads CONFIG, defines Auth module
    4. spotify_api.js — reads Auth, defines SpotifyAPI module
    5. mood_selector.js — pure logic, no deps on Auth/SDK
    6. player.js    — defines window.onSpotifyWebPlaybackSDKReady + Player module
    7. ui.js        — reads TRACK_DATA, CONFIG; defines UI module
    8. app.js (inline) — wires everything together
    9. Spotify SDK  — async so it doesn't block; triggers onSpotifyWebPlaybackSDKReady
  -->
  <script defer src="data.js"></script>
  <script defer src="js/build-info.js"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/spotify_api.js"></script>
  <script defer src="js/mood_selector.js"></script>
  <script defer src="js/player.js"></script>
  <script defer src="js/ui.js"></script>

  <!-- Inline app bootstrap.
       DOMContentLoaded fires after all deferred external scripts have executed,
       so Auth, UI, Player etc. are guaranteed to be defined by then.
       Note: `defer` is silently ignored on inline scripts by all browsers —
       DOMContentLoaded is the correct way to wait for deferred scripts. -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {

      // ---- 0. Preview banner ----
      const _bi = window.BUILD_INFO;
      if (_bi && _bi.deployBranch !== 'main') {
        const _banner = document.getElementById('preview-banner');
        if (_banner) {
          const _td = window.TRACK_DATA;
          const _syncBranch = _td?.sync_branch || null;
          const _syncDate   = _td?.generated_at ? _td.generated_at.slice(0, 10) : null;
          let _html = `webapp: <code>${_bi.deployBranch}</code>`;
          if (_syncBranch) _html += ` &nbsp;·&nbsp; data: <code>${_syncBranch}</code>`;
          if (_syncDate)   _html += ` &nbsp;·&nbsp; ${_syncDate}`;
          _banner.innerHTML = _html;
          _banner.hidden = false;
        }
      }

      // ---- 1. Auth ----
      await Auth.init();

      // ---- 2. Check data ----
      const playlists = window.TRACK_DATA?.playlists;
      const allTracks = window.TRACK_DATA?.tracks;

      if (!playlists || Object.keys(playlists).length === 0) {
        // Overlay already visible — nothing more to do.
        return;
      }

      // ---- 3. Populate playlist selector ----
      const selectEl = document.getElementById('playlist-select');
      const countEl  = document.getElementById('playlist-track-count');

      for (const [id, meta] of Object.entries(playlists)) {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = meta.name;
        selectEl.appendChild(opt);
      }

      // ---- 4. MoodSelector — mutable reference ----
      let selector  = null;
      let isPlaying = false;
      let deviceId  = null;

      function loadPlaylist(playlistId) {
        const meta = playlists[playlistId];
        if (!meta) return;

        // Map ordered track_ids → full track objects; skip missing entries.
        const playlistTracks = meta.track_ids
          .map(tid => allTracks[tid])
          .filter(Boolean);

        selector = new MoodSelector(playlistTracks);

        if (countEl) {
          const n = selector.count;
          countEl.textContent = `${n} track${n !== 1 ? 's' : ''}`;
        }

        UI.setTracks(selector);
      }

      // Load the first playlist immediately.
      const firstPlaylistId = Object.keys(playlists)[0];
      loadPlaylist(firstPlaylistId);

      if (!selector || selector.count === 0) {
        UI.showError(
          "No analyzed tracks found in data.js.\n" +
          "Re-run the Sync Playlist workflow with force_reanalyze enabled."
        );
        return;
      }

      // ---- 5. UI init ----
      UI.init(
        selector,
        /* onPointChanged */ (_x, _y) => { /* cursor updated internally */ },

        /* onPlayPause */ async () => {
          if (!deviceId) return;
          const state = await Player.getCurrentState();
          if (!state) {
            const pt    = UI.getCurrentPoint();
            const track = selector.pickNext(pt.x, pt.y);
            if (track) {
              await Player.setTrackVolume(track);
              Player.resetPositionTracking();
              await SpotifyAPI.playTrack(deviceId, track.uri);
              isPlaying = true;
            }
          } else if (state.paused) {
            await Player.resume();
            isPlaying = true;
          } else {
            await Player.pause();
            isPlaying = false;
          }
        },

        /* onNext */ async () => {
          if (!deviceId) return;
          const pt    = UI.getCurrentPoint();
          const track = selector.pickNext(pt.x, pt.y);
          if (track) {
            Player.resetPositionTracking();
            await SpotifyAPI.playTrack(deviceId, track.uri);
            isPlaying = true;
          }
        },

        /* onSeek */ async (positionMs) => {
          if (!deviceId) return;
          await SpotifyAPI.seekTo(positionMs);
        },
      );

      // ---- 6. Playlist switcher ----
      selectEl.addEventListener('change', async () => {
        // Pause current playback before switching playlists.
        const state = await Player.getCurrentState().catch(() => null);
        if (state && !state.paused) {
          await Player.pause();
          isPlaying = false;
        }
        loadPlaylist(selectEl.value);
      });

      // ---- 7. Player SDK ----
      Player.init(
        /* onTrackChanged */ state => {
          UI.onPlayerStateChanged(state);
          isPlaying = !state.paused;
        },
        /* onTrackEnded */ async () => {
          const pt    = UI.getCurrentPoint();
          const track = selector.pickNext(pt.x, pt.y);
          if (track && deviceId) {
            await Player.setTrackVolume(track);
            Player.resetPositionTracking();
            await SpotifyAPI.playTrack(deviceId, track.uri);
          }
        },
      );

      deviceId = await Player.waitForReady();
    });
  </script>

  <!-- Spotify Web Playback SDK — async so page rendering is not blocked.
       Calls window.onSpotifyWebPlaybackSDKReady (defined in player.js). -->
  <script async src="https://sdk.scdn.co/spotify-player.js"></script>

</body>
</html>
